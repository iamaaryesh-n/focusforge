<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Layer</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="popup-body">
  <div class="popup-shell">

    <!-- HEADER -->
    <div class="popup-header">
      <h1 class="brand-title">⚡ Focus Layer</h1>
      <p class="brand-sub">Stay in your zone</p>
    </div>

    <!-- INTENT INPUT -->
    <div class="card">
      <label class="field-label" for="intentInput">🎯 Your Focus Intent</label>
      <input type="text" id="intentInput" class="text-input" placeholder='e.g. python  or  "data science"'
        autocomplete="off" spellcheck="false">
      <p class="hint-text">Tip: wrap in "quotes" for strict match only</p>
    </div>

    <!-- MODE SELECT -->
    <div class="card">
      <label class="field-label" for="modeSelect">⚙️ Session Mode</label>
      <select id="modeSelect" class="styled-select">
        <option value="normal">Normal (no time limit)</option>
        <option value="timer">Timer (set duration)</option>
      </select>
    </div>

    <!-- TIMER INPUT (hidden by default) -->
    <div class="card timer-card" id="timerContainer">
      <label class="field-label" for="timerInput">⏱ Duration (minutes)</label>
      <input type="number" id="timerInput" class="text-input" min="1" max="480" placeholder="25">
    </div>

    <!-- PREFERENCES -->
    <div class="card">
      <label class="field-label">🎛 Blur Preferences</label>
      <div class="pref-list">

        <label class="pref-row">
          <div class="pref-info">
            <span class="pref-name">Comments section</span>
            <span class="pref-desc">Blur YouTube comments</span>
          </div>
          <div class="mini-toggle">
            <input type="checkbox" id="prefComments">
            <span class="mini-track"><span class="mini-thumb"></span></span>
          </div>
        </label>


      </div>
    </div>

    <!-- ACTION BUTTONS -->
    <div class="btn-row">
      <button class="start-btn" id="startBtn">
        <span class="btn-icon">▶</span> Start
      </button>
      <button class="stop-btn" id="stopBtn">
        <span class="btn-icon">✕</span> Stop
      </button>
    </div>

    <!-- STATUS BAR -->
    <div class="status-bar" id="statusBar">
      <span class="status-dot inactive" id="statusDot"></span>
      <span class="status-text" id="statusText">⚫ Inactive</span>
    </div>

  </div>
  <script src="popup.js"></script>
</body>

</html>
